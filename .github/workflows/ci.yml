name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt || true

      - name: Run regression
        run: |
          source .venv/bin/activate
          python3 tools/regress.py --dut alu --tests tb.tests.test_alu_smoke --seed_start 1 --seed_end 1 --txns 10 --waves off

      - name: Generate report
        run: |
          source .venv/bin/activate
          python3 tools/report.py
